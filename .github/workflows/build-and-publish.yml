name: Build and Publish Docker Images

on:
  push:
    branches:
      - 'v*.*'
    paths:
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}
        cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache,mode=max
        provenance: true

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.0.4

    - name: Cosign Keyless Sign
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        cosign sign ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}

    - name: Cosign Keyless Verify
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        cosign verify ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}
