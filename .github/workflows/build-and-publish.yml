name: Build and Publish Docker Images

on:
  push:
    branches:
      - 'v*.*'
    paths:
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Step 2: Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Step 3: Log in to GHCR
    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}

    # Step 4: Build and push Docker image with cache
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}
        cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache
        cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache,mode=max
        provenance: true
    # Step 5: Install Cosign
    - name: Install Cosign
      run: |
        COSIGN_VERSION="v3.0.4"
        curl -sSL -o cosign https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64
        chmod +x cosign
        sudo mv cosign /usr/local/bin/cosign
    # Step 6: Sign Docker image keyless with OIDC
    - name: Cosign Keyless Sign
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        cosign sign \
          --keyless \
          --certificate-identity-regexp '^https://github.com/${{ github.repository_owner }}/.*$' \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}

    # Step 7: Verify the signature (optional)
    - name: Cosign Keyless Verify
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        cosign verify \
          --keyless \
          --certificate-identity-regexp '^https://github.com/${{ github.repository_owner }}/.*$' \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}
