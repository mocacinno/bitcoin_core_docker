name: Build and Publish Docker Images

on:
  push:
    branches:
      - 'v*.*'
    paths:
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # needed for keyless signing via OIDC

    steps:
    # Step 1: Check out the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Step 2: Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Step 3: Log in to GHCR using OIDC
    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        identity-token: ${{ steps.oidc-token.outputs.token }}

    # Step 3a: Retrieve OIDC token (needed for keyless cosign signing)
    - id: oidc-token
      run: echo "token=unused"

    # Step 4: Pull cache image from GHCR (if available)
    - name: Pull cache image
      run: |
        docker pull ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache || echo "No cache available"

    # Step 5: Build Docker image using cache
    - name: Build Docker image with cache
      run: |
        docker buildx build \
          --cache-from=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache \
          --cache-to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache,mode=max \
          --tag ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }} --load \
          .

    # Step 6: Push Docker image to GHCR
    - name: Push Docker image
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}

    # Step 7: Install Cosign v3.x
    - name: Install Cosign
      run: |
        curl -sSL https://github.com/sigstore/cosign/releases/download/v3.0.4/cosign-linux-amd64 -o cosign
        chmod +x cosign
        sudo mv cosign /usr/local/bin/

    # Step 8: Keyless signing of the Docker image
    - name: Sign Docker image with Cosign (keyless)
      run: |
        cosign sign \
          --identity-token ${{ steps.oidc-token.outputs.token }} \
          ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}

    # Step 9: Optional: verify the signature immediately
    - name: Verify Docker image signature
      run: |
        cosign verify \
          --certificate-identity-regexp "https://github.com/${{ github.repository_owner }}/.*" \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}
