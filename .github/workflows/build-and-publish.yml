name: Build and Publish Docker Images

on:
  push:
    branches:
      - 'v*.*'
    paths:
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for keyless cosign signing

    steps:
    # Step 1: Check out the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Step 2: Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Step 3: Log in to GHCR (required for cache export)
    - name: Log in to GHCR
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    # Step 4: Pull the cache image from GHCR (if available)
    - name: Pull cache image
      run: |
        docker pull ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache || echo "No cache available"

    # Step 5: Build Docker image using cache
    - name: Build Docker image with cache
      run: |
        docker buildx build \
          --cache-from=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache \
          --cache-to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache,mode=max \
          --tag ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }} --load \
          .

    # Step 6: Push Docker image to GHCR
    - name: Push Docker image
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}

    # Step 7: Install Cosign
    - name: Install Cosign
      run: |
        curl -sSfL https://github.com/sigstore/cosign/releases/download/v2.5.2/cosign-linux-amd64 -o cosign
        chmod +x cosign
        sudo mv cosign /usr/local/bin/cosign

    # Step 8: Keyless sign the image
    - name: Sign Docker image with Cosign (keyless)
      env:
        COSIGN_EXPERIMENTAL: 1
      run: |
        cosign sign \
          --certificate-identity-regexp "https://github.com/${{ github.repository_owner }}/.*" \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}
