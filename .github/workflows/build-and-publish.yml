name: Build and Publish Docker Images

on:
  push:
    branches:
      - 'v*.*'
    paths:
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Step 2: Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Step 3: Log in to GHCR with PAT
    - name: Log in to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}

    # Step 4: Pull the cache image from GHCR (if available)
    - name: Pull cache image
      run: |
        docker pull ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache || echo "No cache available"

    # Step 5: Build Docker image using cache
    - name: Build Docker image with cache
      run: |
        docker buildx build \
          --cache-from=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache \
          --cache-to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache,mode=max \
          --tag ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }} --load \
          .

    # Step 6: Push Docker image to GHCR
    - name: Push Docker image
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}

    # Step 7: Install Cosign
    - name: Install Cosign
      run: |
        COSIGN_VERSION="v3.0.4"
        curl -sSL -o cosign https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64
        chmod +x cosign
        sudo mv cosign /usr/local/bin/cosign

    # Step 8: Sign Docker image keyless with OIDC
    - name: Cosign Keyless Sign
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        cosign sign \
          --keyless \
          --certificate-identity-regexp 'https://github.com/${{ github.repository_owner }}/.*' \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}

    # Step 9: Verify the signature (optional)
    - name: Cosign Keyless Verify
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        cosign verify \
          --keyless \
          --certificate-identity-regexp 'https://github.com/${{ github.repository_owner }}/.*' \
          --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}
