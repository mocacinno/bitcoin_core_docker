name: Build and Publish Docker Images

on:
  push:
    branches:
      - 'v*.*'
    paths:
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # needed for cosign keyless signing
  packages: write   # needed to push to GHCR

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository
    - name: Checkout repository
      uses: actions/checkout@v3

    # Step 2: Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Step 3: Log in to Docker Hub or GHCR
    - name: Log in to Docker Hub or GHCR
      run: |
        echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    # Step 4: Pull the cache image from Docker Hub or GHCR (if available)
    - name: Pull cache image
      run: |
        docker pull ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache || echo "No cache available"

    # Step 5: Build Docker image using cache
    - name: Build Docker image with cache
      run: |
        docker buildx build \
          --cache-from=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache \
          --cache-to=type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:cache,mode=max \
          --tag ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }} --load \
          .

    # Step 6: Push Docker image to GHCR
    - name: Push Docker image
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}

    # Step 7: Install Cosign
    - name: Install Cosign
      uses: sigstore/cosign-installer@v3
      with:
        cosign-release: 'latest'

    # Step 8: Sign Docker image with Cosign (GitHub OIDC)
    - name: Sign Docker image with Cosign
      env:
        COSIGN_EXPERIMENTAL: "1"
      run: |
        cosign sign --yes \
          ghcr.io/${{ github.repository_owner }}/${{ github.repository }}:${{ github.ref_name }}
